<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web3 Mastery — Belajar Web3 dari Nol ke Expert</title>
<style>
:root {
  --bg: #0a0a0f;
  --bg2: #12121a;
  --bg3: #1a1a26;
  --bg4: #22223a;
  --accent: #6c63ff;
  --accent2: #a78bfa;
  --accent3: #38bdf8;
  --accent4: #34d399;
  --gold: #fbbf24;
  --red: #f87171;
  --text: #f1f0ff;
  --text2: #a9a8c8;
  --text3: #6b6a8a;
  --border: rgba(108,99,255,0.18);
  --border2: rgba(108,99,255,0.35);
  --card: #16162a;
  --card2: #1e1e35;
  --grad1: linear-gradient(135deg,#6c63ff,#38bdf8);
  --grad2: linear-gradient(135deg,#a78bfa,#34d399);
  --shadow: 0 4px 32px rgba(108,99,255,0.13);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;font-size:15px;line-height:1.7;min-height:100vh}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:1000;background:rgba(10,10,15,0.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);height:60px;display:flex;align-items:center;padding:0 24px;gap:16px}
.nav-logo{font-size:18px;font-weight:700;background:var(--grad1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;white-space:nowrap}
.nav-search{flex:1;max-width:340px;position:relative;margin-left:auto}
.nav-search input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:7px 12px 7px 34px;color:var(--text);font-size:13px;outline:none;transition:border .2s}
.nav-search input:focus{border-color:var(--accent)}
.nav-search svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:15px;height:15px;stroke:var(--text3);fill:none}
.nav-progress{margin-left:16px;font-size:12px;color:var(--text2);white-space:nowrap;display:flex;align-items:center;gap:8px}
.prog-bar{width:80px;height:5px;background:var(--bg4);border-radius:99px;overflow:hidden}
.prog-fill{height:100%;background:var(--grad1);border-radius:99px;transition:width .4s}
.nav-btn{background:var(--accent);color:#fff;border:none;border-radius:7px;padding:6px 14px;font-size:13px;cursor:pointer;font-weight:600;white-space:nowrap}

/* SIDEBAR */
.layout{display:flex;min-height:100vh;padding-top:60px}
aside{width:290px;min-width:290px;background:var(--bg2);border-right:1px solid var(--border);position:fixed;top:60px;bottom:0;left:0;overflow-y:auto;padding-bottom:32px;transition:transform .3s}
aside::-webkit-scrollbar{width:4px}
aside::-webkit-scrollbar-track{background:transparent}
aside::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}
.sidebar-header{padding:18px 20px 10px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--text3)}
.phase-group{margin-bottom:4px}
.phase-toggle{display:flex;align-items:center;gap:8px;padding:9px 20px;cursor:pointer;font-size:13px;font-weight:600;color:var(--text2);transition:color .2s;user-select:none}
.phase-toggle:hover{color:var(--text)}
.phase-toggle .ph-icon{width:18px;height:18px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.phase-toggle .arr{margin-left:auto;font-size:10px;transition:transform .2s;color:var(--text3)}
.phase-toggle.open .arr{transform:rotate(90deg)}
.phase-modules{display:none;padding:2px 0 4px}
.phase-toggle.open + .phase-modules{display:block}
.mod-link{display:flex;align-items:center;gap:8px;padding:7px 20px 7px 40px;font-size:13px;color:var(--text3);cursor:pointer;transition:all .15s;border-left:2px solid transparent;text-decoration:none}
.mod-link:hover{color:var(--text);background:var(--bg3)}
.mod-link.active{color:var(--accent2);border-left-color:var(--accent);background:rgba(108,99,255,0.08)}
.mod-link .done-icon{width:14px;height:14px;border-radius:50%;border:1.5px solid var(--text3);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;margin-left:auto}
.mod-link.completed .done-icon{background:var(--accent4);border-color:var(--accent4);color:#fff}

/* MAIN */
main{margin-left:290px;flex:1;padding:0}
.module-content{max-width:820px;margin:0 auto;padding:40px 32px 80px}

/* HERO */
.hero{background:linear-gradient(135deg,#0d0d1f 0%,#12122a 100%);padding:80px 32px 60px;text-align:center;border-bottom:1px solid var(--border);position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-80px;left:50%;transform:translateX(-50%);width:500px;height:500px;background:radial-gradient(circle,rgba(108,99,255,0.12) 0%,transparent 70%);pointer-events:none}
.hero-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(108,99,255,0.15);border:1px solid var(--border2);border-radius:99px;padding:5px 14px;font-size:12px;color:var(--accent2);margin-bottom:20px}
.hero h1{font-size:42px;font-weight:800;background:var(--grad1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:14px;line-height:1.2}
.hero p{font-size:16px;color:var(--text2);max-width:560px;margin:0 auto 28px}
.hero-stats{display:flex;gap:32px;justify-content:center;flex-wrap:wrap;margin-top:24px}
.hero-stat{text-align:center}
.hero-stat .num{font-size:28px;font-weight:700;background:var(--grad2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-stat .lbl{font-size:12px;color:var(--text3);margin-top:2px}
.start-btn{background:var(--grad1);color:#fff;border:none;border-radius:10px;padding:13px 32px;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .2s;display:inline-block}
.start-btn:hover{opacity:.88}

/* SECTION CONTENT */
.section-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--accent);margin-bottom:8px}
.module-title{font-size:30px;font-weight:800;color:var(--text);margin-bottom:8px;line-height:1.25}
.module-desc{font-size:15px;color:var(--text2);margin-bottom:28px;border-bottom:1px solid var(--border);padding-bottom:24px}
.module-meta{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:28px}
.meta-badge{display:inline-flex;align-items:center;gap:5px;background:var(--bg3);border:1px solid var(--border);border-radius:99px;padding:4px 12px;font-size:12px;color:var(--text2)}
.meta-badge span{color:var(--accent2)}

/* CONTENT BLOCKS */
.content-block{margin-bottom:36px}
.block-title{font-size:18px;font-weight:700;color:var(--text);margin-bottom:14px;display:flex;align-items:center;gap:10px}
.block-num{width:28px;height:28px;border-radius:7px;background:var(--grad1);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
.prose{color:var(--text2);font-size:15px;line-height:1.8}
.prose strong{color:var(--text);font-weight:600}
.prose em{color:var(--accent2)}
.prose h4{color:var(--text);font-size:15px;font-weight:700;margin:16px 0 6px}
.prose ul{padding-left:20px;margin:10px 0}
.prose ul li{margin-bottom:6px}
.prose ol{padding-left:20px;margin:10px 0}
.prose ol li{margin-bottom:6px}

/* CALLOUT BOXES */
.callout{border-radius:10px;padding:16px 20px;margin:16px 0;display:flex;gap:12px;align-items:flex-start}
.callout.info{background:rgba(56,189,248,0.08);border-left:3px solid var(--accent3)}
.callout.warn{background:rgba(251,191,36,0.08);border-left:3px solid var(--gold)}
.callout.danger{background:rgba(248,113,113,0.08);border-left:3px solid var(--red)}
.callout.success{background:rgba(52,211,153,0.08);border-left:3px solid var(--accent4)}
.callout-icon{font-size:18px;flex-shrink:0;margin-top:1px}
.callout-body{font-size:14px;color:var(--text2);line-height:1.7}
.callout-body strong{color:var(--text)}

/* ANALOGY CARD */
.analogy-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px 24px;margin:16px 0;position:relative;overflow:hidden}
.analogy-card::before{content:'💡 ANALOGI DUNIA NYATA';font-size:10px;font-weight:700;letter-spacing:1px;color:var(--gold);display:block;margin-bottom:10px}
.analogy-card p{color:var(--text2);font-size:14px;line-height:1.8}

/* VISUAL BOX */
.visual-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin:16px 0;font-family:monospace;font-size:13px;line-height:2;color:var(--text2);overflow-x:auto}
.visual-box .label{font-size:10px;font-weight:700;letter-spacing:1px;color:var(--accent);font-family:'Segoe UI',sans-serif;margin-bottom:10px;display:block}
.v-block{background:var(--bg3);border:1px solid var(--border2);border-radius:7px;padding:10px 14px;margin:6px 0;color:var(--text)}
.v-block .vb-title{font-size:11px;color:var(--accent2);font-weight:700;margin-bottom:4px}
.v-block .vb-row{display:flex;justify-content:space-between;font-size:12px;color:var(--text3);border-bottom:1px solid var(--border);padding:3px 0}
.v-block .vb-row:last-child{border-bottom:none}
.v-arrow{text-align:center;color:var(--accent);font-size:18px;margin:4px 0}

/* GLOSSARY */
.glossary-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:10px 0}
.gloss-item{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:12px 14px}
.gloss-term{font-size:13px;font-weight:700;color:var(--accent2);margin-bottom:4px}
.gloss-def{font-size:12px;color:var(--text3);line-height:1.6}

/* RISK TABLE */
.risk-table{width:100%;border-collapse:collapse;margin:12px 0;font-size:13px}
.risk-table th{background:var(--bg3);color:var(--text2);font-weight:600;padding:10px 14px;text-align:left;border-bottom:1px solid var(--border)}
.risk-table td{padding:10px 14px;border-bottom:1px solid var(--border);color:var(--text3);vertical-align:top}
.risk-table tr:last-child td{border-bottom:none}
.risk-badge{display:inline-block;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600}
.risk-high{background:rgba(248,113,113,0.15);color:#f87171}
.risk-med{background:rgba(251,191,36,0.15);color:#fbbf24}
.risk-low{background:rgba(52,211,153,0.15);color:#34d399}

/* PRACTICE BOX */
.practice-box{background:var(--card);border:1px solid var(--accent);border-radius:12px;padding:24px;margin:16px 0}
.practice-header{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.practice-icon{width:36px;height:36px;background:var(--grad1);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.practice-title{font-size:16px;font-weight:700;color:var(--text)}
.practice-sub{font-size:12px;color:var(--text3)}
.step-list{list-style:none;margin:12px 0}
.step-list li{display:flex;gap:12px;margin-bottom:12px;align-items:flex-start}
.step-num{width:24px;height:24px;border-radius:50%;background:var(--bg3);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--accent2);flex-shrink:0;margin-top:2px}
.step-text{font-size:14px;color:var(--text2);line-height:1.7}
.step-text a{color:var(--accent3);text-decoration:none}
.step-text a:hover{text-decoration:underline}
.step-text code{background:var(--bg4);padding:1px 6px;border-radius:4px;font-size:12px;color:var(--gold)}

/* RESOURCES TABLE */
.res-table{width:100%;border-collapse:collapse;font-size:13px;margin:12px 0}
.res-table th{background:var(--bg3);color:var(--accent);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;padding:10px 12px;text-align:left;border-bottom:1px solid var(--border)}
.res-table td{padding:10px 12px;border-bottom:1px solid var(--border);color:var(--text2);vertical-align:top}
.res-table tr:hover td{background:var(--bg3)}
.res-table td a{color:var(--accent3);text-decoration:none;font-weight:500}
.res-table td a:hover{text-decoration:underline}
.tag{display:inline-block;padding:2px 7px;border-radius:5px;font-size:11px;font-weight:600;margin:1px}
.tag-free{background:rgba(52,211,153,0.12);color:#34d399}
.tag-paid{background:rgba(248,113,113,0.12);color:#f87171}
.tag-tools{background:rgba(56,189,248,0.12);color:#38bdf8}
.tag-docs{background:rgba(167,139,250,0.12);color:#a78bfa}
.tag-explorer{background:rgba(251,191,36,0.12);color:#fbbf24}

/* QUIZ */
.quiz-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:22px;margin:12px 0}
.quiz-q{font-size:14px;font-weight:600;color:var(--text);margin-bottom:14px}
.quiz-opts{display:flex;flex-direction:column;gap:8px}
.quiz-opt{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--text2);cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:10px}
.quiz-opt:hover{border-color:var(--accent);color:var(--text)}
.quiz-opt.correct{border-color:var(--accent4);background:rgba(52,211,153,0.1);color:var(--accent4)}
.quiz-opt.wrong{border-color:var(--red);background:rgba(248,113,113,0.1);color:var(--red)}
.quiz-letter{width:22px;height:22px;border-radius:50%;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.quiz-feedback{margin-top:12px;padding:10px 14px;border-radius:8px;font-size:13px;display:none}
.quiz-feedback.show{display:block}
.quiz-feedback.ok{background:rgba(52,211,153,0.1);color:var(--accent4);border:1px solid var(--accent4)}
.quiz-feedback.bad{background:rgba(248,113,113,0.1);color:var(--red);border:1px solid var(--red)}

/* JSON BLOCK */
.json-block{background:#0d1117;border:1px solid var(--border);border-radius:10px;padding:18px;font-family:monospace;font-size:12px;line-height:1.8;overflow-x:auto;position:relative}
.json-block .copy-btn{position:absolute;top:10px;right:10px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:11px;color:var(--text2);cursor:pointer;transition:all .2s}
.json-block .copy-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.json-key{color:#79c0ff}
.json-str{color:#a5d6ff}
.json-bool{color:#56d364}
.json-num{color:#ffa657}
.json-punc{color:#8b949e}

/* PROGRESS TRACKER */
.mod-complete-btn{width:100%;background:var(--grad2);color:#fff;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;margin-top:32px;transition:opacity .2s}
.mod-complete-btn:hover{opacity:.88}
.mod-complete-btn.done{background:var(--bg3);color:var(--accent4);border:1px solid var(--accent4)}

/* OVERVIEW GRID */
.phase-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;padding:32px}
.phase-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;cursor:pointer;transition:all .2s;text-decoration:none}
.phase-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.phase-card-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:12px}
.phase-card-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px}
.phase-card-sub{font-size:12px;color:var(--text3);margin-bottom:10px}
.phase-card-prog{height:4px;background:var(--bg4);border-radius:99px;overflow:hidden}
.phase-card-prog-fill{height:100%;background:var(--grad1);border-radius:99px}

/* MODULE NAV FOOTER */
.mod-nav{display:flex;justify-content:space-between;gap:12px;margin-top:48px;padding-top:24px;border-top:1px solid var(--border)}
.mod-nav-btn{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 18px;cursor:pointer;font-size:13px;color:var(--text2);transition:all .2s;flex:1}
.mod-nav-btn:hover{border-color:var(--accent);color:var(--text)}
.mod-nav-btn.next{justify-content:flex-end;text-align:right}
.mod-nav-btn .nav-label{font-size:11px;color:var(--text3)}
.mod-nav-btn .nav-name{font-weight:600;color:var(--text)}

/* MOBILE */
.sidebar-toggle{display:none;background:none;border:none;color:var(--text);cursor:pointer;padding:8px}
@media(max-width:800px){
  aside{transform:translateX(-100%);z-index:999}
  aside.open{transform:translateX(0)}
  main{margin-left:0}
  .sidebar-toggle{display:flex}
  .glossary-grid{grid-template-columns:1fr}
  .hero h1{font-size:28px}
}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;height:200px;color:var(--text3);font-size:14px;gap:10px}
.spinner{width:20px;height:20px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* TIMELINE */
.timeline{position:relative;padding-left:28px;margin:12px 0}
.timeline::before{content:'';position:absolute;left:8px;top:0;bottom:0;width:2px;background:var(--border2);border-radius:99px}
.tl-item{position:relative;margin-bottom:18px}
.tl-dot{width:16px;height:16px;border-radius:50%;background:var(--accent);position:absolute;left:-24px;top:3px;border:2px solid var(--bg)}
.tl-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:3px}
.tl-body{font-size:13px;color:var(--text3);line-height:1.7}
.tl-year{font-size:11px;color:var(--accent2);margin-bottom:3px;font-weight:600}
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
  <div class="nav-logo">⬡ Web3 Mastery</div>
  <div class="nav-search">
    <svg viewBox="0 0 24 24" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" placeholder="Cari modul..." id="searchInput" oninput="searchModules()">
  </div>
  <div class="nav-progress">
    <span id="progText">0/48 modul</span>
    <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
  </div>
</nav>

<!-- SIDEBAR -->
<aside id="sidebar">
  <div class="sidebar-header">Kurikulum Web3</div>
  <div id="sidebarContent"></div>
</aside>

<!-- MAIN -->
<main>
  <div id="mainContent"></div>
</main>

          <h4>WEB 1.0 (1991–2004): Read-Only Web</h4>
          <p>Web1 adalah era internet pertama. Website adalah halaman statis seperti brosur digital. Tidak ada interaksi, tidak ada login, tidak ada komentar. Kamu hanya bisa <em>membaca</em>.</p>
          <p>Teknologinya sederhana: HTML statis, tidak ada database, tidak ada JavaScript yang kompleks. Pengalaman internetnya seperti membaca ensiklopedia offline.</p>

          <p>Web2 adalah revolusi besar. Tiba-tiba user bisa <em>menulis</em> di internet — posting foto, video, status. Ini melahirkan raksasa teknologi: Google, Facebook, Twitter, YouTube, Amazon.</p>
          <p>Model bisnisnya elegan tapi berbahaya: <strong>layanannya gratis, tapi kamu adalah produknya</strong>. Data perilakumu dijual ke pengiklan. Privacymu dimonetisasi.</p>

            <li>Single point of failure — jika server down, semua layanan mati</li>

  '1-1':{
    title:'Kriptografi Dasar',
    phase:'Phase 1 — Fondasi Kriptografi',
    desc:'Memahami ilmu kriptografi yang menjadi fondasi keamanan seluruh ekosistem blockchain dan Web3.',
    duration:'75 menit', level:'Beginner', updated:'Mei 2025',
    sections:[
      {num:1, title:'Konsep Dasar', content:`<div class="prose"><p>Sebelum blockchain ada, ada <strong>kriptografi</strong>. Tanpa kriptografi, tidak akan ada Bitcoin, tidak akan ada Ethereum, tidak akan ada Web3 sama sekali.</p><p>Kriptografi secara sederhana adalah <em>ilmu tentang menyembunyikan informasi</em> sehingga hanya pihak yang berwenang yang bisa membacanya. Tapi di konteks blockchain, kriptografi punya peran yang jauh lebih luas: membuktikan identitas, memverifikasi data, dan memastikan integritas informasi.</p></div>
      <div class="visual-box"><span class="label">🔐 TIGA FUNGSI KRIPTOGRAFI DI BLOCKCHAIN</span>
        <div class="v-block"><div class="vb-title">1. HASHING — Sidik Jari Digital</div><div class="vb-row"><span>Input</span><span>Data apapun (teks, file, transaksi)</span></div><div class="vb-row"><span>Output</span><span>String unik dengan panjang tetap</span></div><div class="vb-row"><span>Sifat</span><span>Satu arah, tidak bisa dibalik</span></div></div>
        <div class="v-block"><div class="vb-title">2. PUBLIC/PRIVATE KEY — Pasangan Kunci</div><div class="vb-row"><span>Private Key</span><span>Kunci rahasia (hanya kamu yang tahu)</span></div><div class="vb-row"><span>Public Key</span><span>Kunci publik (bisa dibagikan ke siapapun)</span></div></div>
        <div class="v-block"><div class="vb-title">3. DIGITAL SIGNATURE — Tanda Tangan Digital</div><div class="vb-row"><span>Dibuat dengan</span><span>Private key</span></div><div class="vb-row"><span>Diverifikasi dengan</span><span>Public key</span></div><div class="vb-row"><span>Membuktikan</span><span>Identitas + integritas data</span></div></div>
      </div>`},
      {num:2, title:'Penjelasan Detail — Hashing', content:`<div class="prose">
        <h4>Apa itu Hash Function?</h4>
        <p>Hash function adalah fungsi matematika yang mengambil input apapun (teks pendek, teks panjang, file besar) dan menghasilkan output dengan panjang tetap yang disebut <strong>hash</strong> atau <strong>digest</strong>.</p>
        <h4>Contoh nyata SHA-256 (hash function yang dipakai Bitcoin):</h4></div>
        <div class="visual-box">
          <div style="font-size:12px;font-family:monospace;line-height:2.2;color:#a9a8c8">
            <div>Input: <span style="color:#38bdf8">"Hello"</span></div>
            <div>SHA-256 Output: <span style="color:#34d399">185f8db32921bd46d208e4d420aef...</span></div>
            <br>
            <div>Input: <span style="color:#38bdf8">"Hello."</span> (ditambah titik)</div>
            <div>SHA-256 Output: <span style="color:#f87171">ce3b43af3bcd7b1e68791e5ced4d...</span></div>
            <br>
            <div style="color:#fbbf24">⚡ Satu karakter berbeda = hash yang sama sekali berbeda!</div>
          </div>
        </div>
        <div class="prose">
        <h4>Lima Sifat Kritis Hash Function:</h4>
        <ol>
          <li><strong>Deterministic:</strong> Input yang sama SELALU menghasilkan hash yang sama</li>
          <li><strong>One-way (irreversible):</strong> Tidak bisa dari hash kembali ke input asli</li>
          <li><strong>Avalanche effect:</strong> Perubahan kecil di input → perubahan besar di hash</li>
          <li><strong>Fixed length:</strong> Berapapun panjang input, hash selalu sama panjangnya</li>
          <li><strong>Collision resistant:</strong> Hampir mustahil dua input berbeda menghasilkan hash sama</li>
        </ol>
        <h4>Dipakai di mana dalam blockchain?</h4>
        <ul>
          <li>Setiap block memiliki hash unik yang merepresentasikan seluruh isinya</li>
          <li>Setiap block menyimpan hash dari block sebelumnya (membentuk chain)</li>
          <li>Jika seseorang mengubah satu transaksi lama → hash block berubah → seluruh chain setelahnya invalid</li>
        </ul>
        </div>`},
      {num:3, title:'Analogi Dunia Nyata', content:`<div class="analogy-card">
        <p><strong>Hash function seperti mesin penghancur dokumen canggih:</strong></p>
        <p>Kamu bisa memasukkan dokumen apapun — satu halaman atau seribu halaman — ke mesin ini, dan mesin akan menghasilkan "kode sidik jari" 64 karakter. Dokumen yang berbeda menghasilkan kode yang berbeda. Dan kamu <em>tidak bisa merekonstruksi dokumen asli dari kode tersebut</em>.</p><br>
        <p>Tapi setiap kali kamu memasukkan dokumen yang SAMA, kode yang keluar selalu SAMA. Ini yang membuat hash berguna untuk verifikasi: "apakah dokumen ini sudah diubah?"</p>
      </div>`},
      {num:4, title:'Visualisasi Mental — Blockchain sebagai Chain of Hashes', content:`<div class="visual-box"><span class="label">⛓️ BAGAIMANA HASH MEMBENTUK BLOCKCHAIN</span>
        <div class="v-block"><div class="vb-title">BLOCK #1 (Genesis Block)</div><div class="vb-row"><span>Data</span><span>Transaksi A, B, C</span></div><div class="vb-row"><span>Hash Block ini</span><span style="color:#34d399">0000abc123...</span></div><div class="vb-row"><span>Hash Prev Block</span><span>0000000000 (tidak ada)</span></div></div>
        <div class="v-arrow">▼ Block #1 hash menjadi referensi Block #2</div>
        <div class="v-block"><div class="vb-title">BLOCK #2</div><div class="vb-row"><span>Data</span><span>Transaksi D, E, F</span></div><div class="vb-row"><span>Hash Block ini</span><span style="color:#34d399">0000def456...</span></div><div class="vb-row"><span>Hash Prev Block</span><span style="color:#38bdf8">0000abc123... ← dari Block #1</span></div></div>
        <div class="v-arrow">▼</div>
        <div class="v-block" style="border-color:#f87171"><div class="vb-title" style="color:#f87171">⚠️ Jika Block #1 diubah:</div><div class="vb-row"><span>Hash Block #1 berubah</span><span style="color:#f87171">menjadi xyz999...</span></div><div class="vb-row"><span>Block #2 invalid</span><span style="color:#f87171">karena hash prev tidak cocok</span></div><div class="vb-row"><span>Semua block setelahnya</span><span style="color:#f87171">juga invalid</span></div></div>
        <div style="margin-top:10px;font-size:12px;color:#34d399">✅ Inilah mengapa blockchain bersifat IMMUTABLE (tidak bisa diubah)</div>
      </div>`},
      {num:5, title:'Istilah Penting', content:`<div class="glossary-grid">
        <div class="gloss-item"><div class="gloss-term">Hash / Digest</div><div class="gloss-def">Output berupa string unik yang dihasilkan dari hash function. Seperti "sidik jari digital" suatu data.</div></div>
        <div class="gloss-item"><div class="gloss-term">SHA-256</div><div class="gloss-def">Secure Hash Algorithm 256-bit. Hash function yang digunakan Bitcoin. Menghasilkan hash 64 karakter hex.</div></div>
        <div class="gloss-item"><div class="gloss-term">Keccak-256</div><div class="gloss-def">Hash function yang digunakan Ethereum. Varian SHA-3 yang dimodifikasi.</div></div>
        <div class="gloss-item"><div class="gloss-term">Collision</div><div class="gloss-def">Kondisi di mana dua input berbeda menghasilkan hash yang sama. Hal yang (hampir) mustahil terjadi di SHA-256.</div></div>
        <div class="gloss-item"><div class="gloss-term">Preimage Attack</div><div class="gloss-def">Upaya untuk menemukan input asli dari sebuah hash. Hash function yang baik sangat resisten terhadap ini.</div></div>
        <div class="gloss-item"><div class="gloss-term">Merkle Tree</div><div class="gloss-def">Struktur data berbentuk pohon di mana setiap node adalah hash dari child-nya. Digunakan untuk efisiensi verifikasi transaksi di blockchain.</div></div>
      </div>`},
      {num:6, title:'Contoh Project Nyata', content:`<div class="prose"><h4>Bitcoin Mining & SHA-256</h4><p>Miner Bitcoin harus menemukan input (disebut "nonce") yang ketika di-hash dengan SHA-256 menghasilkan hash yang dimulai dengan sejumlah angka nol tertentu. Ini seperti melempar dadu jutaan kali sampai mendapat angka yang tepat. Kesulitan ini yang membuat blockchain aman dan membutuhkan energi komputasi besar.</p><h4>Git (bukan blockchain tapi pakai hashing)</h4><p>Git, tool yang dipakai programmer, menggunakan SHA-1 untuk hash setiap commit. Setiap perubahan kode menghasilkan hash unik — inilah yang memungkinkan version control yang akurat.</p></div>`},
      {num:7, title:'Use Cases Dunia Nyata', content:`<div class="prose"><ul><li><strong>Verifikasi file download:</strong> Website menyediakan hash file yang bisa kamu verifikasi setelah download — jika hash cocok, file tidak dimodifikasi.</li><li><strong>Password storage:</strong> Database tidak menyimpan password asli, tapi hash-nya. Saat login, password-mu di-hash dan dibandingkan.</li><li><strong>Blockchain integrity:</strong> Setiap node memverifikasi integritas chain dengan membandingkan hash.</li></ul></div>`},
      {num:8, title:'Risiko dan Red Flags', content:`<div class="callout warn"><div class="callout-icon">⚠️</div><div class="callout-body"><strong>Hash lama bisa rusak:</strong> MD5 dan SHA-1 sudah terbukti punya kelemahan. Jangan gunakan hash function yang sudah deprecated untuk keamanan kritis. Gunakan SHA-256 atau lebih kuat.</div></div>`},
      {num:9, title:'Kesalahan Umum Pemula', content:`<div class="prose"><ol><li><strong>Mengira hash = enkripsi.</strong> Hash adalah one-way, enkripsi adalah two-way. Hashed data tidak bisa di-decrypt, tapi encrypted data bisa di-decrypt dengan key yang benar.</li><li><strong>Mengira hash sama = data sama.</strong> Benar, tapi perlu dipastikan hash function-nya juga sama.</li></ol></div>`},
      {
        num:10, title:'Praktik Langsung',
        content:`<div class="practice-box">
          <div class="practice-header"><div class="practice-icon">⚗️</div><div><div class="practice-title">Praktik: Eksperimen SHA-256 Secara Langsung</div><div class="practice-sub">Tujuan: Merasakan sendiri sifat hash function</div></div></div>
          <p style="font-size:13px;color:#a9a8c8;margin-bottom:14px"><strong>Tools:</strong> Online SHA-256 tool — tidak perlu install apapun</p>
          <ul class="step-list">
            <li><div class="step-num">1</div><div class="step-text">Buka <a href="https://emn178.github.io/online-tools/sha256.html" target="_blank">https://emn178.github.io/online-tools/sha256.html</a></div></li>
            <li><div class="step-num">2</div><div class="step-text">Ketik: <code>Halo dunia</code> dan perhatikan hash yang muncul. Catat hash-nya.</div></li>
            <li><div class="step-num">3</div><div class="step-text">Ubah satu huruf: ketik <code>halo dunia</code> (huruf h kecil). Lihat betapa berbedanya hash yang dihasilkan.</div></li>
            <li><div class="step-num">4</div><div class="step-text">Ketik kembali <code>Halo dunia</code> (persis sama). Verifikasi bahwa hash-nya identik dengan langkah 2. Ini membuktikan: <em>input sama selalu menghasilkan hash yang sama</em>.</div></li>
            <li><div class="step-num">5</div><div class="step-text">Coba input sangat panjang (paste paragraf artikel). Perhatikan: panjang hash tetap 64 karakter meskipun inputnya ribuan karakter.</div></li>
          </ul>
          <div class="callout success"><div class="callout-icon">✅</div><div class="callout-body"><strong>Yang harus kamu pahami setelah praktik ini:</strong> Satu karakter berbeda menghasilkan hash yang sama sekali berbeda. Hash selalu panjang 64 karakter. Input sama = hash sama selalu.</div></div>
        </div>`
      },
      {num:11, title:'Quiz', content:`<div class="quiz-box"><div class="quiz-q">Jika seseorang mengetahui hash "abc123...", apakah mereka bisa mengetahui input aslinya?</div><div class="quiz-opts"><div class="quiz-opt" onclick="answerQuiz(this,'correct','q4')"><div class="quiz-letter">A</div>Tidak — hash adalah one-way function, tidak bisa dibalik</div><div class="quiz-opt" onclick="answerQuiz(this,'wrong','q4')"><div class="quiz-letter">B</div>Ya — dengan dekripsi yang tepat</div><div class="quiz-opt" onclick="answerQuiz(this,'wrong','q4')"><div class="quiz-letter">C</div>Tergantung panjang hash-nya</div><div class="quiz-opt" onclick="answerQuiz(this,'wrong','q4')"><div class="quiz-letter">D</div>Bisa, tapi membutuhkan private key</div></div><div class="quiz-feedback" id="fb-q4"></div></div>`},
      {num:12, title:'Studi Kasus', content:`<div class="prose"><h4>Kasus: Bitcoin Block Hash</h4><p>Setiap Bitcoin block memiliki hash yang dimulai dengan banyak angka nol. Misalnya Block #800000 punya hash: <code style="color:#34d399;font-size:12px">000000000000000000023bff7e8a...b4a2f3c7</code></p><p>Untuk menemukan hash seperti ini, miner harus mencoba miliaran kombinasi nonce per detik. Ketika ditemukan, semua node bisa memverifikasi kebenaran hash tersebut hanya dalam microsecond — ini adalah <strong>asymmetry of proof of work</strong>: sulit membuat, mudah verifikasi.</p></div>`},
      {num:13, title:'Latihan', content:`<div class="prose"><ol><li>Gunakan tool SHA-256 online, hash namamu sendiri 3x. Verifikasi hasilnya selalu sama.</li><li>Hash kalimat "Saya belajar Web3" dan "Saya belajar web3" (perbedaan huruf kapital W). Dokumentasikan hasilnya.</li><li>Cari: "SHA-256 collision attack" — apakah SHA-256 pernah berhasil di-collision attack? Apa yang kamu temukan?</li></ol></div>`},
      {num:14, title:'Review Questions', content:`<div class="prose"><ol><li>Jelaskan lima sifat utama hash function dan mengapa masing-masing penting untuk keamanan blockchain.</li><li>Bagaimana hashing membuat blockchain bersifat immutable?</li><li>Apa perbedaan antara hashing dan enkripsi?</li><li>Mengapa blockchain menggunakan hash dari block sebelumnya di setiap block baru?</li></ol></div>`},

let completed = JSON.parse(localStorage.getItem('w3m_completed') || '[]');
let currentModule = null;

function getModuleIds(){
  return CURRICULUM.flatMap(p=>p.modules.map(m=>m.id));
}

function updateProgress(){
  const all = getModuleIds().length;
  const done = completed.length;
  const pct = Math.round(done/all*100);
  document.getElementById('progText').textContent = `${done}/${all} modul`;
  document.getElementById('progFill').style.width = pct+'%';
}

function buildSidebar(){
  const c = document.getElementById('sidebarContent');
  c.innerHTML = '';
  CURRICULUM.forEach(ph=>{
    const grp = document.createElement('div');
    grp.className='phase-group';
    const tog = document.createElement('div');
    tog.className='phase-toggle';
    tog.innerHTML=`<div class="ph-icon" style="background:${ph.color}20;color:${ph.color}">${ph.emoji}</div>Phase ${ph.phase}<span class="arr">▶</span>`;
    tog.onclick=()=>{tog.classList.toggle('open')};
    const mods = document.createElement('div');
    mods.className='phase-modules';
    ph.modules.forEach(m=>{
      const lk = document.createElement('div');
      lk.className='mod-link'+(completed.includes(m.id)?' completed':'');
      lk.id='ml-'+m.id;
      lk.innerHTML=`<span style="flex:1;font-size:12px">${m.title}</span><div class="done-icon">${completed.includes(m.id)?'✓':''}</div>`;
      lk.onclick=()=>loadModule(m.id);
      mods.appendChild(lk);
    });
    grp.appendChild(tog);
    grp.appendChild(mods);
    c.appendChild(grp);
  });
}

function buildOverview(){
  let html = `
  <div class="hero">
    <div class="hero-badge">⬡ Web3 Mastery Curriculum 2025</div>
    <h1>Belajar Web3<br>dari Nol ke Expert</h1>
    <p>Kurikulum sistematis, mendalam, dengan praktik langsung — dirancang untuk mengubahmu dari pemula total menjadi Web3 expert.</p>
    <button class="start-btn" onclick="loadModule('0-1')">🚀 Mulai dari Awal</button>
    <div class="hero-stats">
      <div class="hero-stat"><div class="num">13</div><div class="lbl">Phase</div></div>
      <div class="hero-stat"><div class="num">48</div><div class="lbl">Modul</div></div>
      <div class="hero-stat"><div class="num">200+</div><div class="lbl">Link Resmi</div></div>
      <div class="hero-stat"><div class="num">6 bln</div><div class="lbl">Est. Selesai</div></div>
    </div>
  </div>
  <div class="phase-grid">`;
  CURRICULUM.forEach(ph=>{
    const total = ph.modules.length;
    const done = ph.modules.filter(m=>completed.includes(m.id)).length;
    const pct = Math.round(done/total*100);
    html+=`<div class="phase-card" onclick="openPhase(${ph.phase})">
      <div class="phase-card-icon" style="background:${ph.color}20;color:${ph.color};font-size:22px">${ph.emoji}</div>
      <div class="phase-card-title">Phase ${ph.phase}: ${ph.title}</div>
      <div class="phase-card-sub">${total} modul · ${ph.modules[0].sub}</div>
      <div style="font-size:11px;color:#6b6a8a;margin-bottom:6px">${done}/${total} selesai</div>
      <div class="phase-card-prog"><div class="phase-card-prog-fill" style="width:${pct}%"></div></div>
    </div>`;
  });
  html+='</div>';
  document.getElementById('mainContent').innerHTML = html;
}

function openPhase(phaseNum){
  const ph = CURRICULUM.find(p=>p.phase===phaseNum);
  if(!ph) return;
  const firstId = ph.modules[0].id;
  if(MODULE_DATA[firstId]) loadModule(firstId);
  else {
    document.getElementById('mainContent').innerHTML=`<div class="module-content"><div class="section-label">${ph.emoji} Phase ${ph.phase}</div><h2 class="module-title">${ph.title}</h2><p class="module-desc">Pilih modul di sidebar untuk mulai belajar.</p><div class="phase-grid" style="padding:0">` +
    ph.modules.map(m=>`<div class="phase-card" onclick="loadModule('${m.id}')"><div class="phase-card-title">${m.title}</div><div class="phase-card-sub">${m.sub}</div><div class="phase-card-prog"><div class="phase-card-prog-fill" style="width:${completed.includes(m.id)?100:0}%"></div></div></div>`).join('')+`</div></div>`;
  }
}

function loadModule(id){
  currentModule = id;
  document.querySelectorAll('.mod-link').forEach(el=>{
    el.classList.remove('active');
    if(el.id==='ml-'+id) el.classList.add('active');
  });
  const ph = CURRICULUM.find(p=>p.modules.some(m=>m.id===id));
  if(ph){
    const tog = document.querySelector(`[onclick="openPhase(${ph.phase})"]`);
    const sidebar = document.getElementById('sidebarContent');
    const grps = sidebar.querySelectorAll('.phase-toggle');
    grps.forEach((g,i)=>{if(CURRICULUM[i]&&CURRICULUM[i].phase===ph.phase){g.classList.add('open')}});
  }
  if(MODULE_DATA[id]){
    renderModule(MODULE_DATA[id], id);
  } else {
    const phData = CURRICULUM.flatMap(p=>p.modules).find(m=>m.id===id);
    document.getElementById('mainContent').innerHTML=`<div class="module-content">
      <div class="section-label">${ph?ph.emoji+' Phase '+ph.phase+' — '+ph.title:''}</div>
      <h1 class="module-title">${phData?phData.title:'Modul '+id}</h1>
      <p class="module-desc">${phData?phData.sub:''}</p>
      <div class="callout info"><div class="callout-icon">📚</div><div class="callout-body"><strong>Modul ini sedang dalam pengembangan.</strong> Konten lengkap akan segera tersedia. Gunakan sidebar untuk navigasi ke modul yang sudah siap.</div></div>
      <div class="mod-nav">${getPrevNext(id)}</div>
    </div>`;
  }
  window.scrollTo(0,0);
}

function renderModule(data, id){
  let sectionsHtml = '';
  data.sections.forEach(s=>{
    sectionsHtml+=`<div class="content-block">
      <div class="block-title"><div class="block-num">${s.num}</div>${s.title}</div>
      ${s.content}
    </div>`;
  });

  let resHtml = '';
  if(data.resources){
    resHtml=`<div class="content-block">
      <div class="block-title"><div class="block-num">📎</div>Resources & Practice Links</div>
      <table class="res-table">
        <tr><th>Resource</th><th>Kategori</th><th>Link Resmi</th><th>Akses</th></tr>
        ${data.resources.map(r=>`<tr><td><strong>${r.title}</strong><br><span style="font-size:11px;color:#6b6a8a">${r.purpose}</span></td><td><span class="tag tag-docs">${r.cat}</span></td><td><a href="${r.url}" target="_blank">${r.url}</a></td><td><span class="tag ${r.free?'tag-free':'tag-paid'}">${r.free?'Gratis':'Berbayar'}</span></td></tr>`).join('')}
      </table>
    </div>`;
  }

  let jsonHtml='';
  if(data.json){
    const j=JSON.stringify(data.json,null,2);
    const colored=j.replace(/"([^"]+)":/g,'<span class="json-key">"$1"</span><span class="json-punc">:</span>')
      .replace(/: "([^"]+)"/g,': <span class="json-str">"$1"</span>')
      .replace(/: (true|false)/g,': <span class="json-bool">$1</span>')
      .replace(/: (\d+)/g,': <span class="json-num">$1</span>');
    jsonHtml=`<div class="content-block">
      <div class="block-title"><div class="block-num">{ }</div>JSON Resource Format</div>
      <div class="json-block"><button class="copy-btn" onclick="copyJson(this,'${id}')">Copy JSON</button><pre style="margin:0">${colored}</pre></div>
    </div>`;
  }

  const isDone = completed.includes(id);
  const ph = CURRICULUM.find(p=>p.modules.some(m=>m.id===id));

  document.getElementById('mainContent').innerHTML=`<div class="module-content">
    <div class="section-label">${ph?ph.emoji+' '+data.phase:''}</div>
    <h1 class="module-title">${data.title}</h1>
    <p class="module-desc">${data.desc}</p>
    <div class="module-meta">
      <div class="meta-badge">⏱ <span>${data.duration}</span></div>
      <div class="meta-badge">📊 <span>${data.level}</span></div>
      <div class="meta-badge">📅 Update: <span>${data.updated}</span></div>
      ${isDone?'<div class="meta-badge" style="color:#34d399;border-color:#34d399">✓ Selesai</div>':''}
    </div>
    ${sectionsHtml}
    ${resHtml}
    ${jsonHtml}
    <button class="mod-complete-btn ${isDone?'done':''}" id="completeBtn" onclick="markComplete('${id}')">
      ${isDone?'✓ Modul Selesai — Lanjut ke Berikutnya →':'✅ Tandai Modul Ini Selesai'}
    </button>
    <div class="mod-nav">${getPrevNext(id)}</div>
  </div>`;
}

function getPrevNext(id){
  const all = getModuleIds();
  const idx = all.indexOf(id);
  let prev='', next='';
  if(idx>0){
    const pid=all[idx-1];
    const pm=CURRICULUM.flatMap(p=>p.modules).find(m=>m.id===pid);
    prev=`<button class="mod-nav-btn" onclick="loadModule('${pid}')"><span>←</span><div><div class="nav-label">Sebelumnya</div><div class="nav-name">${pm?pm.title:pid}</div></div></button>`;
  }
  if(idx<all.length-1){
    const nid=all[idx+1];
    const nm=CURRICULUM.flatMap(p=>p.modules).find(m=>m.id===nid);
    next=`<button class="mod-nav-btn next" onclick="loadModule('${nid}')"><div><div class="nav-label">Berikutnya</div><div class="nav-name">${nm?nm.title:nid}</div></div><span>→</span></button>`;
  }
  return prev+next;
}

function markComplete(id){
  if(!completed.includes(id)){
    completed.push(id);
    localStorage.setItem('w3m_completed', JSON.stringify(completed));
  }
  updateProgress();
  buildSidebar();
  const all=getModuleIds();
  const idx=all.indexOf(id);
  if(idx<all.length-1){
    setTimeout(()=>loadModule(all[idx+1]),300);
  } else {
    document.getElementById('completeBtn').textContent='✓ Semua Modul Selesai! 🎉';
    document.getElementById('completeBtn').classList.add('done');
  }
}

function answerQuiz(el, correctness, qid){
  const box = el.parentElement;
  if(box.dataset.answered) return;
  box.dataset.answered='1';
  el.classList.add(correctness==='correct'?'correct':'wrong');
  const fb = document.getElementById('fb-'+qid);
  if(fb){
    fb.classList.add('show');
    if(correctness==='correct'){
      fb.classList.add('ok');
      fb.innerHTML='✅ <strong>Benar!</strong> Pemahaman yang tepat.';
    } else {
      fb.classList.add('bad');
      fb.innerHTML='❌ <strong>Belum tepat.</strong> Coba baca kembali bagian penjelasan detail di atas.';
      box.querySelectorAll('.quiz-opt').forEach(o=>{
        if(o.dataset.correct||o.innerHTML.includes('correct')){/* highlight correct if needed */}
      });
    }
  }
}

function copyJson(btn, id){
  const data = MODULE_DATA[id];
  if(data&&data.json){
    navigator.clipboard.writeText(JSON.stringify(data.json,null,2));
    btn.textContent='Copied!';
    setTimeout(()=>btn.textContent='Copy JSON',2000);
  }
}

function searchModules(){
  const q = document.getElementById('searchInput').value.toLowerCase();
  if(!q){buildSidebar();return;}
  const c = document.getElementById('sidebarContent');
  c.innerHTML='<div class="sidebar-header">Hasil Pencarian</div>';
  CURRICULUM.forEach(ph=>{
    ph.modules.filter(m=>m.title.toLowerCase().includes(q)||m.sub.toLowerCase().includes(q)).forEach(m=>{
      const lk=document.createElement('div');
      lk.className='mod-link';
      lk.innerHTML=`<span style="flex:1;font-size:12px">${m.title}</span>`;
      lk.onclick=()=>loadModule(m.id);
      c.appendChild(lk);
    });
  });
}

function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
}

function openLink(url){window.open(url,'_blank')}

buildSidebar();
buildOverview();
updateProgress();
</script>
</body>
</html>
